services:
  - type: web
    name: pathway-prep-exams
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: EXAM_ADMIN_KEY
        sync: false
      - key: EXAM_JWT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: EXAM_PUBLIC_URL
        sync: false
      - key: PORTAL_HOME_URL
        sync: false
