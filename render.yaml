services:
  - type: web
    name: pathway-prep-exams
    runtime: node
    buildCommand: npm install && npm run exam:build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: EXAM_ADMIN_KEY
        sync: false
      - key: EXAM_JWT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: EXAM_PUBLIC_URL
        sync: false
      - key: PORTAL_HOME_URL
        sync: false
