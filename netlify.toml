# Free-tier fix: serve the static exam UI from Netlify (always instant),
# proxy API + health checks to Render so the backend can sleep less often.
[build]
  command = "npm install && npm run exam:install && npm run exam:build"
  publish = "exam-portal-design/out"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/api/exam/*"
  to = "https://pathway-prep-exams.onrender.com/api/exam/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "https://pathway-prep-exams.onrender.com/health"
  status = 200
  force = true

[[redirects]]
  from = "/api/certificates/*"
  to = "https://pathway-prep-exams.onrender.com/api/certificates/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/assets/*"
  to = "https://pathway-prep-exams.onrender.com/assets/:splat"
  status = 200
  force = true

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/logo.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"
