name: Keep exams warm

on:
  schedule:
    # Every 5 minutes — Render free tier sleeps after ~15 min idle.
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Ping Render health (retry through cold start)
        run: |
          for URL in \
            "https://pathway-prep-exams.onrender.com/health" \
            "https://exams.pathwayprep.online/health"
          do
            echo "Pinging $URL"
            curl -fsS \
              --retry 20 \
              --retry-delay 4 \
              --retry-all-errors \
              --max-time 120 \
              "$URL" | head -c 200 || echo "failed: $URL"
            echo ""
          done

      - name: Keep traffic for 12 minutes (overlap next cron)
        run: |
          URL="https://pathway-prep-exams.onrender.com/health"
          for i in 1 2 3 4; do
            sleep 180
            echo "Follow-up ping $i"
            curl -fsS --max-time 90 "$URL" || true
          done
